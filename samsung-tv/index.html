<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IBK TV</title>
    <style>
        * { margin: 0; padding: 0; }
        body { background: #000; width: 100vw; height: 100vh; overflow: hidden; }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        #loading {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-family: sans-serif;
            font-size: 2rem;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="loading">Loading IBK TV...</div>
    <iframe
        id="app"
        src="https://ibk-tv-production.up.railway.app"
        allowfullscreen
        onload="document.getElementById('loading').style.display='none'">
    </iframe>
    <script>
        // Fallback: redirect if iframe blocked
        setTimeout(function() {
            var frame = document.getElementById('app');
            try {
                var doc = frame.contentDocument || frame.contentWindow.document;
                if (!doc || doc.URL === 'about:blank') {
                    window.location.href = 'https://ibk-tv-production.up.railway.app';
                }
            } catch(e) {
                window.location.href = 'https://ibk-tv-production.up.railway.app';
            }
        }, 5000);
    </script>
</body>
</html>
